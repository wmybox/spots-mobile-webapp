<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spots</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: #1a1a1a;
      background: #fff;
      padding: 1.5rem 1rem;
      max-width: 680px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
    }

    p {
      margin-bottom: 1rem;
      color: #444;
    }

    nav {
      margin-top: 2rem;
    }

    nav ul {
      list-style: none;
      padding: 0;
    }

    nav li {
      border-top: 1px solid #e5e5e5;
    }

    nav li:last-child {
      border-bottom: 1px solid #e5e5e5;
    }

    nav a {
      display: block;
      padding: 0.875rem 0;
      color: #0066cc;
      text-decoration: none;
      font-size: 1rem;
    }

    nav a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Spots</h1>
  <p>Legal information and disclosures for the Spots mobile app.</p>

  <nav>
    <ul>
      <li><a href="legal/privacy-policy.html">Privacy Policy</a></li>
      <li><a href="legal/terms-and-conditions.html">Terms &amp; Conditions</a></li>
    </ul>
  </nav>
</body>
</html>
